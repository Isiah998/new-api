services:
  qing-api:
    build:
      context: .
      dockerfile: Dockerfile.cn
    image: qing-api-local:${APP_IMAGE_TAG}
    container_name: qing-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - app_data:/data
      - app_logs:/app/logs
    environment:
      SQL_DSN: postgresql://qing_api:${POSTGRES_PASSWORD}@postgres:5432/qing_api
      REDIS_CONN_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: qing-api-node-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q success"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - qing-api-network

  postgres:
    image: dockerproxy.net/library/postgres:15-alpine
    container_name: qing-api-postgres
    restart: always
    environment:
      POSTGRES_USER: qing_api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: qing_api
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qing_api -d qing_api"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qing-api-network

  redis:
    image: dockerproxy.net/library/redis:7-alpine
    container_name: qing-api-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: Asia/Shanghai
    networks:
      - qing-api-network

volumes:
  app_data:
  app_logs:
  postgres_data:
  redis_data:

networks:
  qing-api-network:
    driver: bridge
